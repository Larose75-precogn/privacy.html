<svg viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="800" fill="#0a0e27"/>
  
  <!-- Gradient definitions -->
  <defs>
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Top arc -->
  <path d="M 250 200 Q 400 100 550 200" stroke="url(#blueGradient)" stroke-width="30" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Left circle nodes -->
  <circle cx="280" cy="350" r="20" fill="url(#blueGradient)" filter="url(#glow)"/>
  <circle cx="280" cy="350" r="12" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  
  <!-- Center nodes and connections -->
  <circle cx="400" cy="280" r="18" fill="url(#blueGradient)" filter="url(#glow)"/>
  <circle cx="400" cy="280" r="10" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  
  <circle cx="400" cy="420" r="18" fill="url(#blueGradient)" filter="url(#glow)"/>
  <circle cx="400" cy="420" r="10" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  
  <circle cx="520" cy="350" r="18" fill="url(#blueGradient)" filter="url(#glow)"/>
  <circle cx="520" cy="350" r="10" fill="none" stroke="url(#blueGradient)" stroke-width="3"/>
  
  <!-- Connection lines -->
  <line x1="280" y1="350" x2="400" y2="280" stroke="url(#blueGradient)" stroke-width="4" filter="url(#glow)"/>
  <line x1="280" y1="350" x2="400" y2="420" stroke="url(#blueGradient)" stroke-width="4" filter="url(#glow)"/>
  <line x1="400" y1="280" x2="520" y2="350" stroke="url(#blueGradient)" stroke-width="4" filter="url(#glow)"/>
  <line x1="400" y1="420" x2="520" y2="350" stroke="url(#blueGradient)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Right side P shape -->
  <path d="M 540 250 L 540 450 M 540 250 Q 600 250 600 310 Q 600 350 540 350" 
        stroke="url(#blueGradient)" stroke-width="28" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  
  <!-- Bottom left arc -->
  <path d="M 250 500 Q 350 580 450 520" stroke="url(#blueGradient)" stroke-width="28" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Bottom right arc -->
  <path d="M 550 520 Q 650 580 750 500" stroke="url(#blueGradient)" stroke-width="28" fill="none" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Text: PreCogn -->
  <text x="70" y="650" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="#ffffff" letter-spacing="4">
    Pre
  </text>
  <text x="520" y="650" font-family="Arial, sans-serif" font-size="120" font-weight="bold" fill="url(#blueGradient)" letter-spacing="4" filter="url(#glow)">
    Cogn
  </text>
  
  <!-- Tagline -->
  <text x="120" y="730" font-family="Arial, sans-serif" font-size="32" font-weight="300" fill="#00ccff" letter-spacing="6" filter="url(#glow)">
    UNIVERSAL FLOW ENGINE
  </text>
</svg>